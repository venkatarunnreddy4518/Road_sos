<!DOCTYPE html>
<html>
<head>
  <script>
    (function() {
      if (sessionStorage.getItem('welcome_completed')) {
        return;
      }

      const isIndex = window.location.pathname === '/' || 
                      window.location.pathname === '/index.html' || 
                      window.location.pathname.endsWith('/index.html');
      
      if (!isIndex) return;

      let token = null;
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key === 'access_token' || key === 'flutter.access_token' || key.endsWith('access_token')) {
          token = localStorage.getItem(key);
          if (token && token.startsWith('"') && token.endsWith('"')) {
            token = token.slice(1, -1);
          }
          break;
        }
      }

      if (!token) {
        window.location.href = 'welcome.html';
      } else {
        document.documentElement.style.visibility = 'hidden';

        const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? 'http://localhost:8000'
          : 'https://roadside-help-api.onrender.com';

        fetch(`${apiBase}/api/v1/auth/me`, {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + token
          }
        })
        .then(function(response) {
          if (response.ok) {
            sessionStorage.setItem('welcome_completed', 'true');
            document.documentElement.style.visibility = '';
          } else {
            window.location.href = 'welcome.html';
          }
        })
        .catch(function(err) {
          console.error("Auth check failed:", err);
          sessionStorage.setItem('welcome_completed', 'true');
          document.documentElement.style.visibility = '';
        });
      }
    })();
  </script>

<body>
  <!-- Google Identity Services + OAuth2 popup helper for the custom "Continue with Google" button -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Opens Google's standard account-chooser popup and resolves with an access token.
    window.googleOAuthSignIn = function () {
      return new Promise(function (resolve, reject) {
        try {
          if (!window.google || !google.accounts || !google.accounts.oauth2) {
            reject('google-not-loaded'); return;
          }
          var meta = document.querySelector('meta[name="google-signin-client_id"]');
          var clientId = meta ? meta.content : '';
          var client = google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: 'openid email profile',
            callback: function (resp) {
              if (resp && resp.access_token) resolve(resp.access_token);
              else reject((resp && resp.error) || 'no-access-token');
            },
            error_callback: function (err) { reject((err && err.type) || 'popup-closed'); },
          });
          client.requestAccessToken();
        } catch (e) { reject('' + e); }
      });
    };
  </script>
