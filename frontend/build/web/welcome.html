<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welcome — Roadside SOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Noto+Sans+Devanagari:wght@500;600&family=Noto+Sans+Telugu:wght@500;600&family=Noto+Sans+Tamil:wght@500;600&family=Noto+Sans+Kannada:wght@500;600&family=Noto+Sans+Bengali:wght@500;600&family=Noto+Sans+Gujarati:wght@500;600&family=Noto+Sans+Gurmukhi:wght@500;600&family=Noto+Sans+Malayalam:wght@500;600&family=Noto+Sans+Oriya:wght@500;600&family=Noto+Naskh+Arabic:wght@500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  :root{
    --ink:#34343a; --muted:#8A8F92;
    --green:#0E7C52; --green-bright:#18B26B; --amber:#F5A623;
    --grad-green:linear-gradient(135deg,#1FC676 0%,#0B6E47 100%);
    --uifont:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;
    --scriptfont:'Plus Jakarta Sans','Noto Sans Devanagari','Noto Sans Telugu','Noto Sans Tamil','Noto Sans Kannada','Noto Sans Bengali','Noto Sans Gujarati','Noto Sans Gurmukhi','Noto Sans Malayalam','Noto Sans Oriya','Noto Naskh Arabic',sans-serif;
  }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition-duration:.01ms!important; } }
  html,body{ height:100%; }
  body{
    font-family:var(--uifont); color:var(--ink);
    background:
      radial-gradient(820px 520px at 50% -8%, rgba(24,178,107,.14), transparent 60%),
      radial-gradient(640px 460px at 88% 96%, rgba(245,166,35,.12), transparent 60%),
      #fbfbfd;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    overflow:hidden; position:relative;
  }

  /* faint pulsing rings behind */
  .ambient{ position:fixed; top:42%; left:50%; transform:translate(-50%,-50%); width:680px; height:680px; pointer-events:none; z-index:0; }
  .ambient circle{ fill:none; stroke:#0E7C52; stroke-opacity:.06; transform-origin:center; }
  .ambient .r1{ animation:breathe 5s ease-in-out infinite; }
  .ambient .r2{ animation:breathe 5s ease-in-out .6s infinite; }
  .ambient .r3{ animation:breathe 5s ease-in-out 1.2s infinite; }

  /* brand */
  .brand{ position:relative; z-index:2; margin-top:84px; display:flex; flex-direction:column; align-items:center; gap:16px; animation:rise .8s both; }
  .tile{
    width:76px; height:76px; border-radius:20px; background:var(--grad-green);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 16px 40px rgba(14,124,82,.34);
  }
  .tile svg{ width:44px; height:44px; }
  .tile .ring2{ animation:ping 2.6s ease-out infinite; transform-origin:center; }
  .wordmark{ font-size:16px; font-weight:700; letter-spacing:-.01em; color:var(--ink); }
  .wordmark span{ color:var(--muted); font-weight:600; }

  /* greeting */
  .stage{ position:relative; z-index:2; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; padding:0 24px; }
  .hello{
    font-family:var(--scriptfont);
    font-size:66px; font-weight:600; line-height:1.1; letter-spacing:-.01em;
    text-align:center; color:var(--ink);
    opacity:0; transform:translateY(14px);
    transition:opacity .55s cubic-bezier(.3,.8,.3,1), transform .55s cubic-bezier(.3,.8,.3,1);
    min-height:80px; display:flex; align-items:center;
  }
  .hello.show{ opacity:1; transform:translateY(0); }
  .lang{
    margin-top:14px; font-size:14.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:var(--green);
    opacity:0; transform:translateY(8px);
    transition:opacity .55s .05s, transform .55s .05s;
  }
  .lang.show{ opacity:.85; transform:translateY(0); }

  /* footer / cta */
  .foot{ position:relative; z-index:2; width:100%; max-width:420px; padding:0 28px 46px; display:flex; flex-direction:column; align-items:center; gap:16px; animation:rise .8s .2s both; }
  .dots{ display:flex; gap:6px; margin-bottom:4px; }
  .dots i{ width:6px; height:6px; border-radius:50%; background:#D2D6D4; }
  .dots i.on{ background:var(--green); width:18px; border-radius:4px; transition:.3s; }
  .cta{
    width:100%; border:0; border-radius:15px; cursor:pointer;
    background:var(--grad-green); color:#fff;
    padding:17px; font-family:inherit; font-size:16.5px; font-weight:700; letter-spacing:-.01em;
    display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow:0 10px 26px rgba(14,124,82,.34);
    transition:transform .12s, box-shadow .2s, filter .2s;
  }
  .cta:hover{ filter:brightness(1.05); box-shadow:0 12px 30px rgba(14,124,82,.42); }
  .cta:active{ transform:scale(.985); }
  .cta svg{ width:17px; height:17px; transition:transform .2s; }
  .cta:hover svg{ transform:translateX(3px); }
  .terms{ font-size:12.5px; color:var(--muted); text-align:center; line-height:1.5; }
  .terms a{ color:var(--ink); text-decoration:none; font-weight:600; }

  @keyframes rise{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes breathe{ 0%,100%{ transform:scale(.96); opacity:.5; } 50%{ transform:scale(1.04); opacity:1; } }
  @keyframes ping{ 0%{ transform:scale(.9); opacity:.7; } 70%,100%{ transform:scale(1.5); opacity:0; } }

  /* language selector in top right */
  .lang-select-container {
    position: absolute;
    top: 24px;
    right: 24px;
    z-index: 10;
  }
  .lang-select-btn {
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(14, 124, 82, 0.20);
    color: var(--green);
    padding: 8px 14px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 12px rgba(14, 124, 82, 0.08);
    transition: all 0.15s ease;
    backdrop-filter: blur(8px);
  }
  .lang-select-btn:hover {
    background: #fff;
    border-color: var(--green);
    box-shadow: 0 6px 16px rgba(14, 124, 82, 0.15);
    transform: translateY(-1px);
  }
  .lang-select-btn:active {
    transform: translateY(0);
  }
  .lang-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    list-style: none;
    padding: 6px;
    min-width: 140px;
    display: none;
    flex-direction: column;
    gap: 2px;
    z-index: 100;
    animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .lang-dropdown.show {
    display: flex;
  }
  .lang-dropdown li {
    padding: 8px 12px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lang-dropdown li:hover {
    background: rgba(14, 124, 82, 0.06);
    color: var(--green);
  }
  .lang-dropdown li.active {
    background: rgba(14, 124, 82, 0.1);
    color: var(--green);
  }
  
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95) translateY(-4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
</style>
</head>
<body>

  <div class="lang-select-container">
    <button class="lang-select-btn" id="langSelectBtn">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
      <span id="activeLangName">English</span>
      <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>
    <ul class="lang-dropdown" id="langDropdown">
      <li data-code="en" class="active">English</li>
      <li data-code="hi">हिन्दी</li>
      <li data-code="te">తెలుగు</li>
      <li data-code="ta">தமிழ்</li>
    </ul>
  </div>

  <svg class="ambient" viewBox="0 0 680 680" aria-hidden="true">
    <circle class="r1" cx="340" cy="340" r="150"/>
    <circle class="r2" cx="340" cy="340" r="240"/>
    <circle class="r3" cx="340" cy="340" r="335"/>
  </svg>

  <div class="brand">
    <div class="tile">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="8.5" fill="#fff"/>
        <circle cx="50" cy="50" r="19" stroke="#fff" stroke-width="6"/>
        <circle class="ring2" cx="50" cy="50" r="30" stroke="#FFC861" stroke-width="6"/>
      </svg>
    </div>
    <div class="wordmark">Roadside <span>SOS</span></div>
  </div>

  <div class="stage">
    <div class="hello" id="hello"></div>
    <div class="lang" id="lang"></div>
  </div>

  <div class="foot">
    <div class="dots"><i class="on"></i><i></i><i></i></div>
    <button class="cta" type="button" onclick="sessionStorage.setItem('welcome_completed', 'true'); window.location.href='index.html';">
      Get started
      <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h9M9 4.5 12.5 8 9 11.5" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <p class="terms">Help on the way, anywhere in India.<br/>By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a>.</p>
  </div>

  <script>
    // Database check to see if user is existing (who ever logged in before)
    async function checkExistingUser() {
      let token = null;
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key === 'access_token' || key === 'flutter.access_token' || key.endsWith('access_token')) {
          token = localStorage.getItem(key);
          if (token && token.startsWith('"') && token.endsWith('"')) {
            token = token.slice(1, -1);
          }
          break;
        }
      }

      if (token) {
        try {
          const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://roadside-help-api.onrender.com';
          
          const response = await fetch(`${apiBase}/api/v1/auth/me`, {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });
          
          if (response.ok) {
            // Token is valid! This is an existing user.
            // Bypass welcome screen immediately.
            sessionStorage.setItem('welcome_completed', 'true');
            window.location.href = 'index.html';
            return true;
          }
        } catch (err) {
          console.error("Error checking auth status:", err);
        }
      }
      return false;
    }
    
    checkExistingUser();

    var greetings = [
      { t:'Hello',           l:'English',   dir:'ltr', code:'en' },
      { t:'नमस्ते',           l:'हिन्दी',     dir:'ltr', code:'hi' },
      { t:'నమస్కారం',         l:'తెలుగు',     dir:'ltr', code:'te' },
      { t:'வணக்கம்',          l:'தமிழ்',      dir:'ltr', code:'ta' },
      { t:'నమస్కార',          l:'ಕನ್ನಡ',      dir:'ltr', code:'kn' },
      { t:'নমস্কার',          l:'বাংলা',      dir:'ltr', code:'bn' },
      { t:'નમસ્તે',           l:'ગુજરાતી',    dir:'ltr', code:'gu' },
      { t:'ਸਤ ਸ੍ਰੀ ਅਕਾਲ',     l:'ਪੰਜਾਬੀ',     dir:'ltr', code:'pa' },
      { t:'നമസ്കാരം',         l:'മലയാളം',     dir:'ltr', code:'ml' },
      { t:'नमस्कार',          l:'मराठी',      dir:'ltr', code:'mr' },
      { t:'ନମସ୍କାର',          l:'ଓଡ଼ିଆ',      dir:'ltr', code:'or' },
      { t:'السلام علیکم',     l:'اردو',       dir:'rtl', code:'ur' }
    ];
    
    var translations = {
      en: {
        cta: "Get started",
        terms: 'Help on the way, anywhere in India.<br/>By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a>.'
      },
      hi: {
        cta: "शुरू करें",
        terms: 'मदद रास्ते में, भारत में कहीं भी।<br/>जारी रखने पर आप हमारी <a href="#">शर्तوں</a> और <a href="#">गोपनीयता नीति</a> से सहमत होते हैं।'
      },
      te: {
        cta: "ప్రారంభించండి",
        terms: 'సహాయం దారిలో ఉంది, భారతదేశంలో ఎక్కడైనా.<br/>కొనసాగడం ద్వారా మీరు మా <a href="#">నిబంధనలు</a> &amp; <a href="#">గోపనీయత</a>ను అంగీకరిస్తారు.'
      },
      ta: {
        cta: "தொடங்கவும்",
        terms: 'உதவி வழியில் உள்ளது, இந்தியாவில் எங்கும்.<br/>தொடர்வதன் மூலம் எங்கள் <a href="#">விதிமுறைகள்</a> &amp; <a href="#">தனியுரிமை</a> கொள்கைகளை ஒப்புக்கொள்கிறீர்கள்.'
      }
    };

    var hello = document.getElementById('hello');
    var lang  = document.getElementById('lang');
    var i = 0;
    var timer = null;
    var userSelectedCode = null;

    function paint(g){
      hello.textContent = g.t; hello.style.direction = g.dir;
      lang.textContent = g.l;  lang.style.direction = g.dir;
      hello.classList.add('show'); lang.classList.add('show');
    }
    
    function startCycle() {
      if (timer) clearInterval(timer);
      timer = setInterval(function(){
        hello.classList.remove('show'); lang.classList.remove('show');
        setTimeout(function(){
          if (userSelectedCode) {
            var matchIdx = greetings.findIndex(g => g.code === userSelectedCode);
            if (matchIdx !== -1) {
              i = matchIdx;
              userSelectedCode = null; // Resume normal cycle after showing it once
            }
          } else {
            i = (i + 1) % greetings.length;
          }
          paint(greetings[i]);
        }, 480);
      }, 2100);
    }

    paint(greetings[0]);
    startCycle();

    // Language Dropdown Logic
    var langSelectBtn = document.getElementById('langSelectBtn');
    var langDropdown = document.getElementById('langDropdown');
    var activeLangName = document.getElementById('activeLangName');

    langSelectBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      langDropdown.classList.toggle('show');
    });

    document.addEventListener('click', function() {
      langDropdown.classList.remove('show');
    });

    // Handle Language Change
    var dropdownItems = langDropdown.querySelectorAll('li');
    dropdownItems.forEach(function(item) {
      item.addEventListener('click', function() {
        var code = this.getAttribute('data-code');
        var name = this.textContent;
        
        dropdownItems.forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        activeLangName.textContent = name.split(' ')[0];
        
        // Save preferences for Flutter app
        localStorage.setItem('flutter.language', '"' + code + '"');
        localStorage.setItem('language', code);
        
        // Update welcome UI translations
        if (translations[code]) {
          document.querySelector('.cta').innerHTML = translations[code].cta + ' ' + 
            '<svg viewBox="0 0 16 16" fill="none"><path d="M3 8h9M9 4.5 12.5 8 9 11.5" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          document.querySelector('.terms').innerHTML = translations[code].terms;
        }

        // Show the greeting for selected language immediately
        var gIdx = greetings.findIndex(g => g.code === code);
        if (gIdx !== -1) {
          hello.classList.remove('show'); lang.classList.remove('show');
          setTimeout(function() {
            i = gIdx;
            paint(greetings[gIdx]);
          }, 200);
          userSelectedCode = code;
        }
      });
    });

    // Check if a language preference was already stored
    var storedLang = localStorage.getItem('flutter.language') || localStorage.getItem('language');
    if (storedLang) {
      if (storedLang.startsWith('"') && storedLang.endsWith('"')) {
        storedLang = storedLang.slice(1, -1);
      }
      var activeItem = langDropdown.querySelector('li[data-code="' + storedLang + '"]');
      if (activeItem) {
        activeItem.click();
      }
    }
  </script>
</body>
</html>
