name: roadside_help
description: A roadside help application to find the nearest helpers.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.2
  flutter_localizations:
    sdk: flutter
  http: ^1.1.0
  intl: ^0.20.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  test: ^1.24.0

flutter:
  uses-material-design: true
  generate: true
